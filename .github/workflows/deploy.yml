name: Deploy MPCRP Staff Portal

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
```

The issue was the `${{ secrets.GITHUB_TOKEN }}` line — the curly braces can sometimes be parsed incorrectly depending on the editor or copy method. Make sure when you paste it that line reads exactly:
```
github_token: ${{ secrets.GITHUB_TOKEN }}
